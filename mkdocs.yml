site_name: qgendapy
site_description: Modern Python client for the QGenda REST API
site_author: Lance Reinsmith
repo_url: https://github.com/lreinsmith/qgendapy
copyright: Copyright &copy; 2026 Lance Reinsmith

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_if_no_docstring: true
            members_order: source
            merge_init_into_class: true

nav:
  - QGendaypy:
    - Home: index.md
    - Getting Started: getting-started.md
    - Migration Guide: migration.md
  - API Reference:
      - Index: api/index.md
      - Client: api/client.md
      - Resources:
          - Schedule: api/resources/schedule.md
          - Staff: api/resources/staff.md
          - Task: api/resources/task.md
          - Facility: api/resources/facility.md
          - Organization: api/resources/organization.md
          - Time Event: api/resources/time_event.md
          - Daily Case: api/resources/daily_case.md
          - Request: api/resources/request.md
          - Request Limit: api/resources/request_limit.md
          - Daily: api/resources/daily.md
          - Company: api/resources/company.md
          - Tag: api/resources/tag.md
          - Profile: api/resources/profile.md
          - Pay: api/resources/pay.md
          - Staff Target: api/resources/staff_target.md
          - Credit: api/resources/credit.md
          - Notification: api/resources/notification.md
          - User: api/resources/user.md
          - Integration: api/resources/integration.md
          - Credentialing: api/resources/credentialing.md
          - Support: api/resources/support.md
      - Configuration: api/config.md
      - OData: api/odata.md
      - Response: api/response.md
      - Exceptions: api/exceptions.md
      - Compat: api/compat.md
